name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl shellcheck vim
          npm install -g markdownlint-cli
          vim --version | head -1
          curl -fLo ~/.vim/autoload/plug.vim --create-dirs \
            https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim

      - name: Run quick checks
        run: scripts/test.sh quick

      - name: Run Vim startup sanity
        env:
          TERM: xterm-256color
        run: |
          XDG_CONFIG_HOME="$RUNNER_TEMP/xdg" \
            vim -u .vimrc -i NONE -es -N \
              -c 'if exists(":ChopsticksDoctor") != 2 | cquit | endif' \
              -c 'if exists(":ChopsticksStatus") != 2 | cquit | endif' \
              -c 'if exists(":ChopsticksKeymapAudit") != 2 | cquit | endif' \
              -c 'if !exists("*ChopsticksKeymapAuditInfo") | cquit | endif' \
              -c 'qa!'
